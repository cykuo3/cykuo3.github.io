title: Chengyuankuo-Blog
description: "A Jekyll Blog Theme For Hackers"
author:
  name: "Chengyuankuo"
  email: "chengykuo@163.com"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 6
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "Chengyuankuo"
year : "2020"
